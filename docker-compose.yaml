services:
  api:
    build:
      context: ./API
    ports:
      - "8001:8001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cv_analyser}
      DB_USER: ${DB_USER:-cv_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      ANALYSER_URL: http://analyser:8002
    depends_on:
      db:
        condition: service_healthy
      analyser:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  analyser:
    build:
      context: ./backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Edge reverse proxy: terminates TLS on :443, redirects :80 -> :443, and
  # auto-generates vhost config from each container's VIRTUAL_HOST env (read via
  # the Docker socket). It is the only service that publishes host ports.
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: unless-stopped

  # ACME sidecar: obtains and renews Let's Encrypt certs for every container that
  # sets LETSENCRYPT_HOST, writing them into the shared `certs` volume.
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    depends_on:
      - nginx-proxy
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DEFAULT_EMAIL: ${ACME_EMAIL}
      # Uncomment to use the Let's Encrypt STAGING endpoint while testing
      # (avoids hitting production rate limits). Remove for real certs.
      # ACME_CA_URI: https://acme-staging-v02.api.letsencrypt.org/directory
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    expose:
      - "80"
    environment:
      # Discovered by nginx-proxy / acme-companion to route traffic and issue certs.
      VIRTUAL_HOST: ${PROD_DOMAIN}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${PROD_DOMAIN}
      LETSENCRYPT_EMAIL: ${ACME_EMAIL}
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-cv_analyser}
      POSTGRES_USER: ${DB_USER:-cv_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/user_profile/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cv_user} -d ${DB_NAME:-cv_analyser}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data:
  certs:
  vhost:
  html:
  acme:
