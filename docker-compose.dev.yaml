services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5200:5173"      # was 5173 — free of all Clearbox ports
    environment:
      VITE_DEV_BACKEND_URL: http://api:8001   # internal container port unchanged
      VITE_SSL_CERT_FILE: /app/certs/fullchain.pem
      VITE_SSL_KEY_FILE: /app/certs/privkey.pem
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./certs:/app/certs:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./API
      dockerfile: Dockerfile.dev
    ports:
      - "8010:8001"      # was 8001 — clashed with Clearbox api03-customer-data
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cv_analyser}
      DB_USER: ${DB_USER:-cv_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      ANALYSER_URL: http://analyser:8002   # internal URL unchanged
    volumes:
      - ./API:/app
    depends_on:
      db:
        condition: service_healthy
      analyser:
        condition: service_started
    restart: unless-stopped

  analyser:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8011:8002"      # was 8002 — clashed with Clearbox api06-questionnaire-mgmt
    volumes:
      - ./backend:/app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5440:5432"      # was 5432 — clashed with Clearbox db02-customer-info
    environment:
      POSTGRES_DB: ${DB_NAME:-cv_analyser}
      POSTGRES_USER: ${DB_USER:-cv_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data_dev:/var/lib/postgresql/data
      - ./database/user_profile/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cv_user} -d ${DB_NAME:-cv_analyser}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data_dev: