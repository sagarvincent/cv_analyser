services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_DEV_BACKEND_URL: http://api:8001
      # TLS material so the browser ↔ Vite dev server leg is HTTPS. See certs/README.md.
      VITE_SSL_CERT_FILE: /app/certs/fullchain.pem
      VITE_SSL_KEY_FILE: /app/certs/privkey.pem
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./certs:/app/certs:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./API
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cv_analyser}
      DB_USER: ${DB_USER:-cv_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      ANALYSER_URL: http://analyser:8002
    volumes:
      - ./API:/app
    depends_on:
      db:
        condition: service_healthy
      analyser:
        condition: service_started
    restart: unless-stopped

  analyser:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8002:8002"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-cv_analyser}
      POSTGRES_USER: ${DB_USER:-cv_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data_dev:/var/lib/postgresql/data
      - ./database/user_profile/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cv_user} -d ${DB_NAME:-cv_analyser}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data_dev:
