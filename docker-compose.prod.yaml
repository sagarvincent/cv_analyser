services:
  api:
    build:
      context: ./API
    ports:
      - "20002:8001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cv_analyser}
      DB_USER: ${DB_USER:-cv_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      ANALYSER_URL: http://analyser:8002
    depends_on:
      db:
        condition: service_healthy
      analyser:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  analyser:
    build:
      context: ./backend
    environment:
      PYTHONPATH: /app/BES03_JDResumeScorer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "20001:80"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-cv_analyser}
      POSTGRES_USER: ${DB_USER:-cv_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/user_profile/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cv_user} -d ${DB_NAME:-cv_analyser}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data:
